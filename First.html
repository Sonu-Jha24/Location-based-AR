<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR.js Museum - Noida Location</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js'></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">

        <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.5" position="0 20 0"></a-light>

        <a-assets>
            <a-asset-item id="pottery" src="egyptian_pottery.glb"></a-asset-item>
            <a-asset-item id="konark" src="konark_sun_temple-compressed.glb"></a-asset-item>
            <a-asset-item id="soundIcon" src="sound.glb"></a-asset-item>
        </a-assets>

        <a-camera gps-new-camera="simulateLatitude: 28.621473048578164; simulateLongitude: 77.09200546700103"
                     far="100000">
            <a-cursor></a-cursor>
        </a-camera>

        <a-entity 
            gltf-model="#pottery" 
            gps-new-entity-place="latitude: 28.6216000; longitude: 77.0920054;"  
            scale="0.5 0.5 0.5" 
            position="0 0 0"> 
        </a-entity>

        <a-box color="red" 
            gps-new-entity-place="latitude: 28.6216000; longitude: 77.0920054;" 
            scale="10 10 10"
            position="0 5 0">
        </a-box>

    </a-scene>
</body>
</html>
