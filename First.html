import React from 'react'

const Aframe = () => {
  return (
    /* Container zaroori hai taaki camera poori screen cover kare */
    <div style={{ width: '100vw', height: '100vh', margin: 0, overflow: 'hidden' }}>
      <a-scene 
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
      >
        {/* Simulation testing ke liye best hai */}
        <a-camera 
          gps-new-camera 
          rotation-reader 
          simulateLongitude='77.308875' 
          simulateLatitude='28.470043'
        ></a-camera>

        {/* Box thoda door rakha hai taaki dikhayi de */}
        <a-box
          color='#AA0000'
          scale='20 20 20'
          gps-entity-place='latitude: 28.470143; longitude: 77.308975;'
        ></a-box>
      </a-scene>
    </div>
  )
}

export default Aframe;
