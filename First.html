<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>AR.js Location Test</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: true;">

        <a-assets>
            <a-asset-item id="pottery" src="egyptian_pottery.glb"></a-asset-item>
        </a-assets>

        <a-camera 
            gps-new-camera="simulateLatitude: 28.4742; simulateLongitude: 77.4764;" 
            rotation-reader look-controls>
        </a-camera>
               
        <a-entity gltf-model="#pottery"
                  scale="10 10 10"
                  gps-new-entity-place="latitude:28.474984167543322; longitude:77.47645741405282;"
                  position="0 0 0"
               ></a-entity>
       
    </a-scene>
</body>
</html>
