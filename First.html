<<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR.js Final Fix</title>
    
    <script src="https://unpkg.com/aframe@1.3.0/dist/aframe-min.js"></script>
    <script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar-nft.js"></script>

    <style>
        /* Isse white bottom wala issue solve ho jayega */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #arjs-device-orientation-hint { display: none !important; }
    </style>
</head>

<body>
    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: true; trackingMethod: best;">

        <a-camera 
            gps-new-camera="simulateLatitude: 28.4741; simulateLongitude: 77.4763;" 
            rotation-reader>
        </a-camera>

        <a-box 
            gps-new-entity-place="latitude: 28.4741; longitude: 77.4763" 
            color="red" 
            scale="30 30 30"
            position="0 0 0">
        </a-box>

    </a-scene>

    <script>
        // Check karne ke liye ki script load hui ya nahi
        window.onload = () => {
            console.log("AR.js Scene Loaded");
            alert("Agar ye alert dikh raha hai, toh script load ho gayi hai!");
        };
    </script>
</body>
</html>
