<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR.js Museum - Noida Location</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.5" position="0 20 0"></a-light>

        <a-assets>
            <a-asset-item id="pottery" src="egyptian_pottery.glb"></a-asset-item>
            <a-asset-item id="konark" src="konark_sun_temple-compressed.glb"></a-asset-item>
            <a-asset-item id="soundIcon" src="sound.glb"></a-asset-item>
        </a-assets>

        <a-camera>
            <a-cursor></a-cursor>
            
            <a-entity 
                gltf-model="#konark" 
                scale="0.05 0.05 0.05" 
                position="0 -1 -5"> 
            </a-entity>

        </a-camera>

    </a-scene>
</body>
</html>
