<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR.js Museum - Location Fixed</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: false; trackingMethod: best;">

        <a-assets>
            <a-asset-item id="pottery" src="egyptian_pottery.glb"></a-asset-item>
        </a-assets>

        <a-camera gps-camera rotation-reader></a-camera>

        <a-entity 
            gltf-model="#pottery"
            scale="30 30 30" 
            gps-entity-place="latitude: 28.47498; longitude: 77.47645;">
        </a-entity>

        <a-cylinder color="red" radius="0.5" height="2"
            gps-entity-place="latitude: 28.4742; longitude: 77.4764;">
        </a-cylinder>

    </a-scene>
</body>
</html>
