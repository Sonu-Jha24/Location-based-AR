<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR.js Debug Mode</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <div id="debug-text" style="position: fixed; top: 10px; left: 10px; z-index: 10; background: white; color: black; padding: 10px; font-family: sans-serif;">
        Waiting for Camera/GPS...
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: true; videoTexture: true;">

        <a-assets>
            <a-asset-item id="pottery" src="egyptian_pottery.glb"></a-asset-item>
        </a-assets>

        <a-camera gps-camera rotation-reader look-controls></a-camera>

        <a-box color="red" scale="5 5 5" 
            gps-entity-place="latitude: 28.4749; longitude: 77.4764;">
        </a-box>

        <a-entity gltf-model="#pottery"
            scale="15 15 15"
            position="0 0 0"
            gps-entity-place="latitude: 28.47498; longitude: 77.47645;">
        </a-entity>
    </a-scene>

    <script>
        // Check if camera is actually working
        window.addEventListener('camera-init', (data) => {
            document.getElementById('debug-text').innerHTML = "Camera Started! Look around for the Red Box.";
        });

        window.addEventListener('camera-error', (error) => {
            document.getElementById('debug-text').innerHTML = "Camera Error: " + error.detail.message;
            document.getElementById('debug-text').style.background = "red";
        });
    </script>
</body>
</html>
