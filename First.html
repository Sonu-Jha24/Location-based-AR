<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR.js Museum - Auto Location</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js'></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        AFRAME.registerComponent('auto-place', {
            schema: {
                // latOffset = Aage (North) bhejne ke liye
                // lonOffset = Left/Right (West/East) bhejne ke liye
                latOffset: {type: 'number', default: 0},
                lonOffset: {type: 'number', default: 0}
            },
            init: function() {
                window.addEventListener('gps-camera-update-position', e => {
                    if(this.isPlaced) return;
                    this.isPlaced = true;

                    // User ki live location mein offset add kiya
                    const lat = e.detail.position.latitude + this.data.latOffset;
                    const lon = e.detail.position.longitude + this.data.lonOffset;

                    this.el.setAttribute('gps-new-entity-place', `latitude: ${lat}; longitude: ${lon}`);
                });
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">

        <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.5" position="0 20 0"></a-light>

        <a-assets>
            <a-asset-item id="pottery" src="egyptian_pottery.glb"></a-asset-item>
            <a-asset-item id="konark" src="konark_sun_temple-compressed.glb"></a-asset-item>
            <a-asset-item id="soundIcon" src="sound.glb"></a-asset-item>
        </a-assets>

        <a-camera gps-new-camera="gpsMinDistance: 5" far="100000">
            <a-cursor></a-cursor>
        </a-camera>

<a-entity auto-place="latOffset: 0.00005; lonOffset: 0">
            
            <a-entity 
                gltf-model="#pottery" 
                scale="0.2 0.2 0.2" 
                position="0 0 0"> 
            </a-entity>

            <a-entity position="0 1.5 1" rotation="0 0 0">
                
                <a-plane width="4" height="2.5" color="#0055ff" material="transparent: true; opacity: 0.5; side: double; metalness: 0.8; roughness: 0.1"></a-plane>
                
                <a-text 
                    value="Ancient Egyptian Pottery (c. 126 CE)\n\nSpanning over 5,000 years, was primarily functional, crafted from Nile silt or marl clay for storing, transporting, and cooking food. Key types included Predynastic black-topped redware, everyday utility pots, and decorated faience. Techniques evolved from hand-forming to wheel-thrown, with pottery being essential in both daily life and burial rituals." 
                    align="center"
                    color="#FFFFFF" 
                    width="3.5" 
                    position="0 0 0.1" 
                    wrap-count="45" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.fnt">
                </a-text>

            </a-entity>
        </a-entity>

<a-entity auto-place="latOffset: 0.00010; lonOffset: -0.00012">
            
            <a-entity 
                gltf-model="#konark" 
                scale="3 3 3"
                position="0 0 0">
            </a-entity>

            <a-entity position="0 2 4" rotation="0 0 0">
                
                <a-plane width="4" height="2.5" color="#0055ff" material="transparent: true; opacity: 0.5; side: double; metalness: 0.8; roughness: 0.1"></a-plane>
                
                <a-text 
                    value="KONARK SUN TEMPLE\nThe Cosmic Chariot (13th Century CE)\n\nLocated in Odisha, the 13th-century Konark Sun Temple is a monumental representation of the sun god Surya's chariot. Built by King Narasimhadeva I, this UNESCO World Heritage Site features 24 elaborately carved stone wheels led by seven horses, showcasing the pinnacle of Kalinga architecture." 
                    align="center" 
                    color="#FFFFFF" 
                    width="3.5" 
                    position="0 0 0.1" 
                    wrap-count="45" 
                    font="https://cdn.aframe.io/fonts/DejaVu-sdf.fnt">
                </a-text>

            </a-entity>
        </a-entity>

    </a-scene>
</body>
</html>
