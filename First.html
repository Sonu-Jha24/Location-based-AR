<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR.js Final Fullscreen Fix</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        /* Ye CSS aapka white area khatam kar dega */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            left: 0 !important;
            top: 0 !important;
        }
    </style>
</head>

<body>
    <a-scene 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: true;">

        <a-camera 
            gps-new-camera="simulateLatitude: 28.4741; simulateLongitude: 77.4763;" 
            rotation-reader>
        </a-camera>

        <a-box 
            gps-new-entity-place="latitude: 28.4741; longitude: 77.4763" 
            color="red" 
            scale="25 25 25"
            position="0 0 0">
        </a-box>

    </a-scene>
</body>
</html>
