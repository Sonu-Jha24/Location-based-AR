<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR.js Museum - Auto Location</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js'></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        AFRAME.registerComponent('auto-place', {
            schema: {
                // Distance set karne ka option (taaki models takrayein nahi)
                distance: {type: 'number', default: 0.00015} 
            },
            init: function() {
                window.addEventListener('gps-camera-update-position', e => {
                    // Agar ek baar place ho gaya, toh dubara nahi hilega (gayab hone se rokne ke liye)
                    if(this.isPlaced) return;
                    this.isPlaced = true;

                    // User ki LIVE location li aur usme distance add kar diya
                    const lat = e.detail.position.latitude + this.data.distance;
                    const lon = e.detail.position.longitude;

                    this.el.setAttribute('gps-new-entity-place', `latitude: ${lat}; longitude: ${lon}`);
                });
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">

        <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.5" position="0 20 0"></a-light>

        <a-assets>
            <a-asset-item id="pottery" src="egyptian_pottery.glb"></a-asset-item>
            <a-asset-item id="konark" src="konark_sun_temple-compressed.glb"></a-asset-item>
            <a-asset-item id="soundIcon" src="sound.glb"></a-asset-item>
        </a-assets>

        <a-camera gps-new-camera="gpsMinDistance: 5" far="100000">
            <a-cursor></a-cursor>
        </a-camera>

<a-entity 
            gltf-model="#pottery" 
            auto-place="distance: 0.00005"
            scale="3 3 3" 
            position="0 0 0"> 
        </a-entity>

        <a-entity 
            gltf-model="#konark" 
            auto-place="distance: 0.00012"
            scale="2 2 2"
            position="0 0 0">
        </a-entity>

    </a-scene>
</body>
</html>
