<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR.js Multi-Shape Tour</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: false;">

        <a-camera gps-camera rotation-reader look-controls></a-camera>

        <a-box color="red" scale="2 2 2" 
            gps-entity-place="latitude: 28.4743; longitude: 77.4765;">
        </a-box>

        <a-sphere color="blue" radius="1.5"
            gps-entity-place="latitude: 28.4741; longitude: 77.4766;">
        </a-sphere>

        <a-cylinder color="yellow" radius="0.8" height="3"
            gps-entity-place="latitude: 28.4742; longitude: 77.4763;">
        </a-cylinder>

        <a-entity 
            gltf-model="url(egyptian_pottery.glb)"
            scale="15 15 15"
            gps-entity-place="latitude: 28.47425; longitude: 77.47645;">
        </a-entity>

    </a-scene>
</body>
</html>
