<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR.js Museum Test</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: false;">

        <a-assets>
            <a-asset-item id="pottery" src="egyptian_pottery.glb"></a-asset-item>
        </a-assets>

        <a-camera gps-camera rotation-reader></a-camera>

        <a-entity 
            gltf-model="#pottery"
            scale="20 20 20"
            gps-entity-place="latitude: 28.47498; longitude: 77.47645;">
        </a-entity>

    </a-scene>
</body>
</html>
