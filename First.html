<!DOCTYPE html>
<html>
<head>
    <title>AR.js Museum Tour - No GPS</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
        
        <a-entity camera look-controls position="0 1.6 0"></a-entity>

        <a-sphere position="0 1.25 -10" radius="1.25" color="red"></a-sphere>
        
        <a-box position="10 1.25 0" width="2" height="2" depth="2" color="blue"></a-box>
        
        <a-cylinder position="-10 1.25 0" radius="1" height="3" color="yellow"></a-cylinder>
        
        <a-cone position="0 1.25 10" radius-bottom="1.5" height="3" color="green"></a-cone>

        <a-torus position="0 8 -5" radius="1" tube="0.2" color="purple"></a-torus>

    </a-scene>
</body>
</html>
