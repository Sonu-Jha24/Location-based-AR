<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Location Based Museum Tour</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
    >
      <a-light type="ambient" intensity="1.5"></a-light>
      <a-light type="directional" position="0 10 0" intensity="1"></a-light>

      <a-entity
        gltf-model="url(./giza-pyramids-miniworld.glb)"
        /* Model ko thoda aur door (28.6708) rakha hai taaki wo aapse chipka na rahe */
        gps-entity-place="latitude: 28.6708011; longitude: 77.0753384;"
        /* Scale ko badhakar 5 5 5 kiya hai (agar chota lage toh 10 10 10 karein) */
        scale="5 5 5"
        /* Model ka front face hamesha camera ki taraf rahega */
        look-at="[gps-camera]"
        /* Rotation fix: Axis ko adjust kiya hai taaki upar ka part samne dikhe */
        rotation="0 180 0"
      >
      </a-entity>

      <a-camera 
        gps-camera="simulateLatitude: 28.6706011; simulateLongitude: 77.0753384;" 
        rotation-reader>
      </a-camera>
    </a-scene>
  </body>
</html>
