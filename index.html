<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Location Based Museum Tour</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
    >
      <a-light type="ambient" intensity="1.5"></a-light>
      <a-light type="directional" position="0 10 5" intensity="1"></a-light>

      <a-entity
        gltf-model="url(./giza-pyramids-miniworld.glb)"
        /* Model ko 28.6708 par rakha (Lagbhag 20m door) taaki wo screen na bhare */
        gps-entity-place="latitude: 28.6708011; longitude: 77.0753384;"
        /* Scale ko 10 rakha hai taaki wo bada aur saaf dikhe */
        scale="10 10 10"
        /* look-at ko 'y-only' kiya hai taaki model sirf left-right ghoome, upar-neeche tila na ho */
        look-at="[gps-camera]"
        /* Rotation fix: Agar model leta hua dikhe toh 90 ko 0 karke dekhein */
        rotation="0 0 0"
      >
      </a-entity>

      <a-camera 
        gps-camera="simulateLatitude: 28.6706011; simulateLongitude: 77.0753384;" 
        rotation-reader>
      </a-camera>
    </a-scene>
  </body>
</html>
