<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Location Based Museum Tour</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  </head>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-entity
        gltf-model="url(./giza-pyramids-miniworld.glb)"
        gps-entity-place="latitude: 28.6707011; longitude: 77.0753384;"
        scale="0.1 0.1 0.1"
        look-at="[gps-camera]"
        
        
      >
      </a-entity>

      <a-camera 
  gps-camera="simulateLatitude: 28.6706011; simulateLongitude: 77.0753384;" 
  rotation-reader>
</a-camera>
    </a-scene>
  </body>
</html>
