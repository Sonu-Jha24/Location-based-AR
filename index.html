<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Location Based Museum Tour</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
    >
      <a-light type="ambient" intensity="1.5"></a-light>
      <a-light type="directional" position="0 10 5" intensity="1"></a-light>

      <a-entity
        gltf-model="url(./giza-pyramids-miniworld.glb)"
        /* Model ko 28.6710 par rakha (Lagbhag 40m door) taaki screen cover na ho */
        gps-entity-place="latitude: 28.6710011; longitude: 77.0753384;"
        /* Scale ko 2 2 2 rakhein, agar chota lage toh hi badhayein */
        scale="2 2 2"
        /* look-at hamesha use karein taaki model gayab na ho */
        look-at="[gps-camera]"
        /* Agar model leta hua dikhe toh 0 0 0 ko -90 0 0 karke dekhein */
        rotation="0 0 0"
      >
      </a-entity>

      <a-box 
        gps-entity-place="latitude: 28.6710011; longitude: 77.0753384;" 
        material="color: red" 
        scale="2 2 2"
        position="0 5 0">
      </a-box>

      <a-camera 
        gps-camera="simulateLatitude: 28.6706011; simulateLongitude: 77.0753384;" 
        rotation-reader>
      </a-camera>
    </a-scene>
  </body>
</html>
